name: Security - DAST ZAP

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: write

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Pentest2026!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Pentest2026! -C -Q 'SELECT 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Apply EF Core migrations
        run: |
          dotnet ef database update --connection "Server=localhost;Database=VulnerableDb;User Id=sa;Password=Pentest2026!;TrustServerCertificate=true;"
        working-directory: .

      - name: Build app
        run: dotnet build --configuration Release

      - name: Run app in background
        env:
          ASPNETCORE_URLS: http://+:8080
          ConnectionStrings__DefaultConnection: "Server=localhost;Database=VulnerableDb;User Id=sa;Password=Pentest2026!;TrustServerCertificate=true;"
        run: |
          nohup dotnet bin/Release/net10.0/VulnerableApp.dll > app.log 2>&1 &
          sleep 15
          cat app.log

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'
          artifact_name: 'zap-scan-report'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html