version: "3.9"

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
      - C:\Users\goten\source\repos\VulnerableApp\Logs:/var/log/vulnerableapp
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability

networks:
  observability:

volumes:
  grafana-data:
  loki-data: