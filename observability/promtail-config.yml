server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: vulnerableapp
    static_configs:
      - targets:
          - localhost
        labels:
          job: vulnerableapp
          app: VulnerableApp
          category: general
          __path__: /var/log/vulnerableapp/*.txt
    pipeline_stages:
      - match:
          selector: '{job="vulnerableapp"} |~ "(?i)(login|autenticacion|logout)"'
          stages:
            - static_labels:
                category: security

      - match:
          selector: '{job="vulnerableapp"} |~ "(?i)(api\\.|/api/)"'
          stages:
            - static_labels:
                category: audit